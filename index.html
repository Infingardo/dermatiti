// spongiosi:["lieve","moderata"] non deve accettare "marcata" (tipico di PR, PLEVA)
// paracheratosi:["focale","moderata"] non deve accettare "marcata" (tipico di PLEVA)
// v2.9: neutrofili aggiunto — ["rari","presenti"] in dermatite irritativa non deve accettare "abbondanti"
// ["presenti","abbondanti"] in psoriasi/bolle è già al top ordinale → oneOf ≡ atLeast, nessun danno
const EXACT_ARRAY_FIELDS=new Set(['spongiosi','paracheratosi','neutrofili']);

const matchAtLeast=(field,expected,actual)=>{
    const rank=ORD[field];
    if(!rank)return actual===expected;
    const eIdx=rank.indexOf(expected);
    const aIdx=rank.indexOf(actual);
    if(eIdx<0||aIdx<0)return actual===expected;
    return aIdx>=eIdx;
};

            // v2.7: coerenza — penalità MF scatta anche con epidermotropismo marcato
            spongiosi_proporzionata_mf:()=>d.spongiosi_proporzionata==="si"&&matchAtLeast('epidermotropismo','presente',d.epidermotropismo),
            // v2.1: PLEVA - necrosi massiva + eritrociti intraepidermici
            pleva_necrosi_eritrociti:()=>d.necrosi_cheratinociti_diffusa&&d.eritrociti_extravasati_intraepidermici,
            // v2.1: rimming adipociti → SPTCL
            rimming_adipociti_flag:()=>d.rimming_adipociti==='si'&&d.panniculite_tipo==="lobulare"
        };
        return chk[f]?chk[f]():false;
    },
    calcScore(c,exp,val,w){
        if(typeof exp==='boolean')return val===exp?w:0;
        if(Array.isArray(exp)){
            // v2.8: EXACT_ARRAY_FIELDS → oneOf (range chiuso); altri → atLeast(min dell'array)
            if(EXACT_ARRAY_FIELDS.has(c))return exp.includes(val)?w:0;
            return exp.some(e=>matchAtLeast(c,e,val))?w:0;
        }
        return matchAtLeast(c,exp,val)?w:0;
    },
    scorePat(k,p,d,excl){
        let s=0,m=0;
        // v2.4: campi stringa non compilati (='') esclusi dal denominatore → non valutato ≠ discordante
        // i boolean restano nel denominatore: checkbox non spuntato = assente è semanticamente esplicito
        const addCrit=(c,v,w)=>{
            const val=d[c];
            if(typeof val==='string'&&val==='')return; // non valutato: esce dal denominatore
            m+=w;s+=this.calcScore(c,v,val,w);
        };
        Object.entries(p.major).forEach(([c,v])=>addCrit(c,v,SC.MAJOR));
        if(p.minor)Object.entries(p.minor).forEach(([c,v])=>addCrit(c,v,SC.MINOR));
        if(k==='micosi_fungoide_early'&&d.spongiosi_proporzionata==='si'){
            s=Math.max(0,s-SC.MF_SPONG_PENALTY);
        }
        const pct=m>0?Math.round((s/m)*100):0;
        return{pct:excl?Math.max(SC.MIN_EXCL,pct-SC.RED_PENALTY):pct,excl,m};
    },
    calc(d){
        const flags=RED_FLAGS.filter(rf=>this.evalFlag(rf.flag,d));
        const scores=[];
        Object.entries(DX).forEach(([k,p])=>{
            const excl=flags.some(rf=>rf.escludi.includes(k));
            const{pct,excl:ex,m}=this.scorePat(k,p,d,excl);
            scores.push({key:k,...p,pct,excl:ex,m});
        });
        scores.sort((a,b)=>b.pct-a.pct);
        const high=scores.filter(x=>x.pct>=SC.THRESH);
        const low=scores.filter(x=>x.pct>=30&&x.pct<50).slice(0,3);
        const hints=this.hints(d);
        const syphilisWarning=["presenti","abbondanti"].includes(d.plasmacellule)&&d.pattern_primario==="psoriasiforme";
        return{diagnoses:high,lowConf:low,allScores:scores,flags,hints,syphilisWarning};
    },
    hints(d){
        const p=d.pattern_primario;
        const H={
            spongotico:{gen:"Spongotico aspecifico",escl:["Dermatofitosi (PAS)","MF (epidermotropismo senza spongiosi?)"],cons:["Eczema NOS","ACD vs ICD","Pitiriasi rosea"],col:["PAS","Sierologia lue"]},
            psoriasiforme:{gen:"Psoriasiforme aspecifico",escl:["Tinea (PAS)","Sifilide (plasmacellule?)"],cons:["Psoriasi iniziale","Dermatite seborroica"],col:["PAS","Sierologia lue"]},
            interfaccia_lichenoide:{gen:"Lichenoide",escl:["GVHD","Drug lichenoide","PLEVA (necrosi massiva?)"],cons:["Lichen planus","Lichenoid keratosis","PLEVA"],col:["IF se lupus","CD30 se PLEVA fulminante"]},
            interfaccia_vacuolare:{gen:"Vacuolare",escl:["EM/TEN","Drug"],cons:["Lupus (MxA+)","Dermatomiosite (MxA+, mucina)"],col:["IF","Alcian blue","MxA"]},
            granulomatoso:{gen:"Granulomatoso",escl:["TB/funghi","Corpo estraneo"],cons:["Sarcoidosi","GA"],col:["ZN","PAS","Polarizzazione"]},
            granulomatoso_palizzata:{gen:"Granulomatoso palizzata",escl:["Infezione"],cons:["GA (mucina)","Necrobiosi lipoidica (sandwich)","Nodulo reumatoide (fibrina)"],col:["Alcian blue","PAS"]},
            vasculitico:{gen:"Vasculitico",escl:["Vasculopatia (no leucocitoclasia)"],cons:["LCV","Vasculite IgA"],col:["IF per Ig"]},
            vasculopatico:{gen:"Vasculopatico",escl:["Vasculite vera"],cons:["Livedoide","Coagulopatia"],col:["Perls","Coagulazione"]},
            panniculitico:{gen:"Panniculitico",escl:["SPTCL (rimming adipociti+atipici+emofagocitosi)","Pancreatica (ghost cells)"],cons:["EN (settale)","Lupus panniculitis (lobulare, follicoli)"],col:["IHC T se linfoma","ZN"]},
            mastocitario:{gen:"Mastocitario",escl:["Istiocitoma"],cons:["Mastocitosi cutanea","Urticaria pigmentosa"],col:["Giemsa","CD117","Triptasi","CD25"]},
            subcorneo:{gen:"Pustole subcornee",escl:["Pemfigo fogliacco (IF)","Candidosi (PAS)","Dermatofitosi (PAS)"],cons:["Sneddon-Wilkinson","AGEP (farmaco?)","Impetigine bollosa/SSSS"],col:["PAS","IF diretta (IgA)","Gram se essudato"]}
        };
        return H[p]?[H[p]]:[];
    },
    // v2.5: IHC panel basato su allScores (non solo high) → cattura DD viva anche sotto soglia
    needsIHCPanel(allScores){
        if(!allScores||!allScores.length)return false;
        const pso=allScores.find(x=>x.key==='psoriasi_vulgaris');
        // v2.7: best spong competitor, non il primo per ordine lista
        const spongCandidates=allScores.filter(x=>['dermatite_allergica_contatto','dermatite_atopica_acuta','lichen_simplex_chronicus'].includes(x.key));
        const spong=spongCandidates.sort((a,b)=>b.pct-a.pct)[0];
        if(!pso||!spong)return false;
        return pso.pct>=30&&spong.pct>=30&&Math.abs(pso.pct-spong.pct)<25;
    }
};

const Results=memo(({dx,lowConf,flags,hints,showIHC,syphilisWarning,onMod,onExp})=>{
    // v2.7: alert su dx + lowConf — sospetti importanti non spariscono sotto soglia
    const allDx=[...dx,...(lowConf||[])];
    const hasLymph=allDx.some(d=>d.cat&&d.cat.includes('Linfoma'));
    const hasEos=allDx.some(d=>d.cat==='Eosinofilo');
    const hasPann=allDx.some(d=>d.cat&&d.cat.includes('Panniculite'));
    const hasPleva=allDx.some(d=>d.key==='pleva');
    return(<div className="bg-white rounded-xl shadow-lg p-6">
    <div className="flex items-center justify-between mb-6"><h2 className="text-2xl font-bold">📋 Diagnosi Differenziale</h2>
    <div className="flex gap-2"><button onClick={onExp} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold">💾 Esporta</button>
    <button onClick={onMod} className="px-4 py-2 bg-slate-200 rounded-lg hover:bg-slate-300 text-sm font-semibold">← Modifica</button></div></div>
    {syphilisWarning&&<SyphilisAlert/>}
    <div className="mb-4 p-3 bg-slate-100 border border-slate-300 rounded-lg">
    <p className="text-xs text-slate-600">ℹ️ 🟢 Alta ≥70% | 🟡 Intermedia 50-69% | 🔴 Bassa &lt;50% — compatibilità istologica con i criteri selezionati, NON probabilità clinica né bayesiana.</p></div>
    {showIHC&&<IHCPanel/>}
    {hasLymph&&<div className="mb-6 p-4 bg-red-50 border-2 border-red-500 rounded-lg"><h3 className="text-lg font-bold text-red-900 mb-2">⚠️ SOSPETTO LINFOMA</h3><p className="text-sm text-red-800">IHC: CD3,CD4,CD8,CD7,TOX | PCR TCR</p></div>}
    {hasPleva&&<div className="mb-6 p-4 bg-pink-50 border-2 border-pink-400 rounded-lg"><h3 className="text-lg font-bold text-pink-900 mb-2">⚠️ PLEVA – Mucha-Habermann</h3><p className="text-sm text-pink-800">Escludere linfoma con PCR TCR. CD30 se fulminante. Correlazione clinica essenziale.</p></div>}
    {(hasPleva||hasLymph)&&<div className="mb-6 p-4 bg-slate-50 border-2 border-slate-400 rounded-lg">
    <h3 className="text-lg font-bold text-slate-800 mb-2">🧬 Nota sulla clonalità TCR</h3>
    <p className="text-sm text-slate-700 mb-2">La clonalità TCR <strong>non è sinonimo di malignità</strong>. Può essere presente in:</p>
    <ul className="text-sm text-slate-700 space-y-1 mb-2">
    <li>• <strong>PLEVA</strong> (Mucha-Habermann): clonalità fino al 50-60% dei casi</li>
    <li>• <strong>Pitiriasi lichenoide cronica</strong>: clonalità documentata</li>
    <li>• <strong>Dermatiti croniche</strong>: clonalità debole possibile (espansione reattiva)</li>
    </ul>
    <p className="text-sm text-slate-600 italic">La diagnosi di MF richiede integrazione di morfologia + immunofenotipo + clinica + PCR. La PCR da sola non è sufficiente per diagnosi né per esclusione.</p>
    </div>}
    {hasPann&&<div className="mb-6 p-4 bg-teal-50 border-2 border-teal-500 rounded-lg"><h3 className="text-lg font-bold text-teal-900 mb-2">🔍 PATTERN PANNICULITICO</h3><p className="text-sm text-teal-800">Settale (EN) vs Lobulare (Lupus, SPTCL). Rimming adipociti + atipia + emofagocitosi + fenotipo T citotossico → aumentare sospetto SPTCL; da solo non discrimina da LEP.</p></div>}
    {hasEos&&<div className="mb-6 p-4 bg-orange-50 border-2 border-orange-500 rounded-lg"><h3 className="text-lg font-bold text-orange-900 mb-2">🔶 PATTERN EOSINOFILO</h3><p className="text-sm text-orange-800">Farmaci? Punture? Flame figures → forte supporto per Wells nel contesto (non specifiche: si vedono anche in artropod reactions e EGPA).</p></div>}
    {flags.length>0&&<div className="mb-6 p-4 bg-amber-50 border-2 border-amber-500 rounded-lg"><h3 className="text-lg font-bold text-amber-900 mb-2">🚩 RED FLAGS</h3><div className="text-sm text-amber-800 space-y-1">{flags.map((f,i)=><p key={i}>• <strong>{f.diagnosi}</strong></p>)}</div></div>}
    {dx.length>0&&<div className="space-y-4 mb-6">{dx.map((d,i)=><DxCard key={d.key} dx={d} idx={i}/>)}</div>}
    {/* v2.10: HintsBox sempre quando dx=0, indipendente da lowConf */}
    {dx.length===0&&<HintsBox hints={hints}/>}
    {lowConf&&lowConf.length>0&&(<div className="mb-6">
        <h3 className="text-lg font-semibold text-slate-700 mb-3">🤔 Altri differenziali rilevanti</h3>
        <div className="space-y-3">{lowConf.map(d=><LowCard key={d.key} dx={d}/>)}</div>
    </div>)}
    {dx.length===0&&(!lowConf||lowConf.length===0)&&(<div className="p-6 bg-slate-50 border-2 border-slate-200 rounded-lg text-center"><p className="font-semibold text-slate-700">🔬 Pattern non diagnostico</p><p className="text-sm text-slate-600 mt-1">Considera livelli aggiuntivi, correlazione clinica, nuova biopsia.</p></div>)}
    <div className="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg"><p className="text-sm text-blue-900"><strong>💡</strong> Correlazione clinico-patologica sempre necessaria.</p></div></div>);
});

    const{data,upd,reset:resetData}=useData();
    const[showRes,setShowRes]=useState(false);
    const[res,setRes]=useState({diagnoses:[],lowConf:[],allScores:[],flags:[],hints:[],syphilisWarning:false});
    const[quickMode,setQuickMode]=useState(false);
    const handleReset=useCallback(()=>{if(confirm('Reset?')){resetData();resetStep();setShowRes(false);}},[]);
    const handleCalc=useCallback(()=>{setRes(Engine.calc(data));setShowRes(true);},[data]);
    const showIHC=useMemo(()=>Engine.needsIHCPanel(res.allScores),[res.allScores]);
    const handleExp=useCallback(()=>{
        let c=`REFERTO DERMATOPATOLOGICO - DermPath v2.10.3\nData: ${new Date().toLocaleDateString('it-IT')}\nPattern: ${data.pattern_primario}`;
        if(data.panniculite_tipo)c+=` (${data.panniculite_tipo})`;
        c+='\n';
        if(res.syphilisWarning)c+=`\n⚠️⚠️⚠️ PLASMACELLULE IN PSORIASIFORME → ESCLUDERE SIFILIDE ⚠️⚠️⚠️\n`;
        if(data.rimming_adipociti==='si')c+=`\n⚠️ RIMMING ADIPOCITI presente: reperto supportivo per SPTCL — correlare con atipia citologica, emofagocitosi, IHC T e clinica; non discrimina da LEP da solo.\n`;
        if(res.diagnoses&&res.diagnoses.length>0)c+=`\nDIAGNOSI:\n${res.diagnoses.map((d,i)=>`${i+1}. ${d.nome} (${d.pct}% compatibilità istologica)\n   ${d.note}`).join('\n\n')}`;
        // v2.10: hints esportati quando non ci sono diagnosi alte — coerenza con UI
        if((!res.diagnoses||res.diagnoses.length===0)&&res.hints&&res.hints.length>0){
            const h=res.hints[0];
            c+=`\nPATTERN: ${h.gen}`;
            if(h.escl&&h.escl.length)c+=`\nDa escludere: ${h.escl.join(', ')}`;
            if(h.cons&&h.cons.length)c+=`\nConsiderare: ${h.cons.join(', ')}`;
        }
        // v2.9: lowConf sempre esportato — evita paradosso alert senza card
        if(res.lowConf&&res.lowConf.length>0)c+=`\n\nALTRI DIFFERENZIALI RILEVANTI:\n${res.lowConf.map((d,i)=>`${i+1}. ${d.nome} (${d.pct}%)`).join('\n')}`;
        if(showIHC)c+=`\n\n⚠️ DD EQUIVOCA - Pannello IHC: Ki-67, p53, CD34, IL-36γ`;
        c+=`\n\n---\nNOTA: Compatibilità istologica ≠ probabilità clinica.\nDermPath v2.10.3`;
        const b=new Blob([c],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`referto_${Date.now()}.txt`;a.click();
    },[data,res,showIHC]);
    const renderStep=useMemo(()=>{
        switch(step){
            case 1:return<Step1 data={data} upd={upd} onNext={next}/>;
            case 2:return<Step2 data={data} upd={upd} onBack={prev} onNext={next}/>;
            case 3:return<Step3 data={data} upd={upd} onBack={prev} onNext={next}/>;
            case 4:return<Step4 data={data} upd={upd} onBack={prev} onGen={handleCalc}/>;
            default:return null;
        }
    },[step,data,upd,next,prev,handleCalc]);
    return(<div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4"><div className="max-w-4xl">
    <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
    <div className="flex items-center justify-between">
    <div><h1 className="text-3xl font-bold text-slate-800">🔬 DermPath v2.10.3</h1>
    <p className="text-slate-600 mt-1">Tri-state 26 criteri morfologici | matchAtLeast + EXACT_ARRAY_FIELDS | IHC panel su tutti gli score | label coerenti col motore</p></div>
    <div className="flex items-center gap-4">
    <div className="flex items-center gap-2">
    <span className="text-sm text-slate-600">Quick</span>
    <div className={`toggle-switch ${quickMode?'active':''}`} onClick={()=>{setQuickMode(!quickMode);resetStep();resetData();setShowRes(false);}}/>
    </div>
    <button onClick={handleReset} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-semibold">🔄 Reset</button>
    </div></div></div>
    {!showRes&&<Steps cur={quickMode?1:step} quick={quickMode}/>}
    {!showRes?(
        quickMode?<QuickForm data={data} upd={upd} onGen={handleCalc}/>:
        <div className="bg-white rounded-xl shadow-lg p-6">{renderStep}</div>
    ):<Results dx={res.diagnoses} lowConf={res.lowConf} flags={res.flags} hints={res.hints} showIHC={showIHC} syphilisWarning={res.syphilisWarning} onMod={()=>setShowRes(false)} onExp={handleExp}/>}
    <div className="mt-6 text-center text-sm text-slate-600">
    <p>DermPath v2.10.3 | infiltrato_neutrofili_pustole → TS esposto | Quick subcorneo block condizionale</p>
    <p className="text-xs text-slate-500 mt-1">⚠️ Strumento di supporto. Correlazione clinico-patologica sempre necessaria.</p>
    </div></div></div>);
};
ReactDOM.render(<App/>,document.getElementById('root'));
    </script>
</body>
</html>
